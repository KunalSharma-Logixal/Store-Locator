services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: storelocator-backend

    ports:
      - "10000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: storelocator-frontend

    ports:
      - "10001:80"

    depends_on:
      - backend

    restart: unless-stopped
