services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: storelocator-backend

    volumes:
      - ./backend/data:/app/data

    expose:
      - "10000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: storelocator-frontend

    ports:
      - "10001:80"

    depends_on:
      - backend

    restart: unless-stopped
